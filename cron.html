<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crontab Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">
    
    <!-- Main Container -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 w-full max-w-3xl p-6 md:p-8">

        <!-- Header -->
        <h1 class="text-2xl md:text-3xl font-bold text-gray-700 mb-2 text-center">Crontab Editor</h1>
        <p class="text-center text-gray-500 text-sm mb-8">Create and copy cron schedules easily</p>

        <!-- Result Display Area -->
        <div class="bg-gray-50 border border-gray-300 rounded-lg p-6 mb-8 text-center relative shadow-inner">
            <div id="cron-result" class="text-4xl md:text-5xl font-mono text-gray-800 tracking-widest font-bold mb-6">
                * * * * *
            </div>
            
            <!-- Copy Button -->
            <button onclick="copyToClipboard()" class="bg-white hover:bg-gray-100 text-gray-700 px-5 py-2.5 rounded shadow-sm border border-gray-300 transition-colors flex items-center mx-auto focus:outline-none focus:ring-2 focus:ring-gray-300 font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                Copy Symbol
            </button>
        </div>

        <!-- Input Area -->
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <!-- Minute -->
            <div class="flex flex-col">
                <label for="min" class="text-sm font-semibold text-gray-600 mb-1 text-center md:text-left">Minute</label>
                <input type="text" id="min" value="*" class="cron-input border border-gray-300 rounded px-3 py-2 text-center font-mono focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 bg-white">
                <span class="text-xs text-gray-400 mt-1 text-center">0-59</span>
            </div>
            <!-- Hour -->
            <div class="flex flex-col">
                <label for="hour" class="text-sm font-semibold text-gray-600 mb-1 text-center md:text-left">Hour</label>
                <input type="text" id="hour" value="*" class="cron-input border border-gray-300 rounded px-3 py-2 text-center font-mono focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 bg-white">
                <span class="text-xs text-gray-400 mt-1 text-center">0-23</span>
            </div>
            <!-- Day of month -->
            <div class="flex flex-col">
                <label for="dom" class="text-sm font-semibold text-gray-600 mb-1 text-center md:text-left">Day (Month)</label>
                <input type="text" id="dom" value="*" class="cron-input border border-gray-300 rounded px-3 py-2 text-center font-mono focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 bg-white">
                <span class="text-xs text-gray-400 mt-1 text-center">1-31</span>
            </div>
            <!-- Month -->
            <div class="flex flex-col">
                <label for="mon" class="text-sm font-semibold text-gray-600 mb-1 text-center md:text-left">Month</label>
                <input type="text" id="mon" value="*" class="cron-input border border-gray-300 rounded px-3 py-2 text-center font-mono focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 bg-white">
                <span class="text-xs text-gray-400 mt-1 text-center">1-12</span>
            </div>
            <!-- Day of week -->
            <div class="flex flex-col">
                <label for="dow" class="text-sm font-semibold text-gray-600 mb-1 text-center md:text-left">Day (Week)</label>
                <input type="text" id="dow" value="*" class="cron-input border border-gray-300 rounded px-3 py-2 text-center font-mono focus:outline-none focus:border-gray-500 focus:ring-1 focus:ring-gray-500 bg-white">
                <span class="text-xs text-gray-400 mt-1 text-center">0-6</span>
            </div>
        </div>

        <!-- Quick Presets -->
        <div class="border-t border-gray-200 pt-6">
            <h3 class="text-sm font-semibold text-gray-600 mb-3 text-center md:text-left">Quick Patterns:</h3>
            <div class="flex flex-wrap gap-2 justify-center md:justify-start">
                <button onclick="setCron('*', '*', '*', '*', '*')" class="text-xs bg-gray-50 border border-gray-300 text-gray-600 hover:bg-gray-200 px-3 py-1.5 rounded transition-colors">Every Minute</button>
                <button onclick="setCron('0', '*', '*', '*', '*')" class="text-xs bg-gray-50 border border-gray-300 text-gray-600 hover:bg-gray-200 px-3 py-1.5 rounded transition-colors">Every Hour</button>
                <button onclick="setCron('0', '0', '*', '*', '*')" class="text-xs bg-gray-50 border border-gray-300 text-gray-600 hover:bg-gray-200 px-3 py-1.5 rounded transition-colors">Midnight (Daily)</button>
                <button onclick="setCron('0', '0', '*', '*', '0')" class="text-xs bg-gray-50 border border-gray-300 text-gray-600 hover:bg-gray-200 px-3 py-1.5 rounded transition-colors">Every Week</button>
                <button onclick="setCron('0', '0', '1', '*', '*')" class="text-xs bg-gray-50 border border-gray-300 text-gray-600 hover:bg-gray-200 px-3 py-1.5 rounded transition-colors">Every Month</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-800 text-white px-4 py-3 rounded shadow-lg opacity-0 pointer-events-none transform translate-y-4 transition-all duration-300 flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-green-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        Symbol copied successfully!
    </div>

    <script>
        // Get all cron input elements
        const inputs = document.querySelectorAll('.cron-input');
        const resultDisplay = document.getElementById('cron-result');
        const toast = document.getElementById('toast');

        // Function to update cron display when input changes
        function updateCronDisplay() {
            // Get value, use asterisk (*) fallback if empty
            const min = document.getElementById('min').value.trim() || '*';
            const hour = document.getElementById('hour').value.trim() || '*';
            const dom = document.getElementById('dom').value.trim() || '*';
            const mon = document.getElementById('mon').value.trim() || '*';
            const dow = document.getElementById('dow').value.trim() || '*';

            // Combine into cron string
            resultDisplay.textContent = `${min} ${hour} ${dom} ${mon} ${dow}`;
        }

        // Add event listeners so every keystroke updates the text instantly
        inputs.forEach(input => {
            input.addEventListener('input', updateCronDisplay);
        });

        // Function to apply quick pattern presets
        function setCron(min, hour, dom, mon, dow) {
            document.getElementById('min').value = min;
            document.getElementById('hour').value = hour;
            document.getElementById('dom').value = dom;
            document.getElementById('mon').value = mon;
            document.getElementById('dow').value = dow;
            updateCronDisplay();
        }

        // Function to copy cron string to clipboard
        function copyToClipboard() {
            const textToCopy = resultDisplay.textContent.trim();
            
            // Using document.execCommand('copy') directly
            // since navigator.clipboard is restricted by IFrame Permissions Policy
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            
            // Hide textarea to prevent screen flicker/scrolling
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";

            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast();
                }
            } catch (err) {
                console.error('Failed to copy', err);
            }

            document.body.removeChild(textArea);
        }

        // Logic for showing floating toast notification
        let toastTimeout;
        function showToast() {
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000); // Message disappears in 3 seconds
        }
    </script>
</body>
</html>
