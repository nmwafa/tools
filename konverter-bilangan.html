<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverter Basis Bilangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menghilangkan panah atas/bawah pada input number jika digunakan, 
           meskipun kita menggunakan type="text" di sini untuk keleluasaan format */
        input[type=text] {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Konverter Bilangan</h1>
        </div>

        <div class="space-y-5">
            <!-- Desimal (Basis 10) -->
            <div>
                <label class="block text-gray-600 text-sm font-semibold mb-1" for="dec">
                    Desimal <span class="text-gray-400 font-normal">(Basis 10)</span>
                </label>
                <div class="flex gap-2">
                    <input type="text" id="dec" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent bg-gray-50 text-gray-800 font-mono text-lg transition-all" 
                        placeholder="Contoh: 255" autocomplete="off">
                    <button onclick="copyText('dec', this)" class="p-3 bg-gray-100 border border-gray-300 rounded-xl hover:bg-gray-200 focus:outline-none transition-colors text-gray-600 flex-shrink-0" title="Salin Desimal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-check hidden text-green-600"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                </div>
            </div>

            <!-- Biner (Basis 2) -->
            <div>
                <label class="block text-gray-600 text-sm font-semibold mb-1" for="bin">
                    Biner <span class="text-gray-400 font-normal">(Basis 2)</span>
                </label>
                <div class="flex gap-2">
                    <input type="text" id="bin" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent bg-gray-50 text-gray-800 font-mono text-lg transition-all" 
                        placeholder="Contoh: 11111111" autocomplete="off">
                    <button onclick="copyText('bin', this)" class="p-3 bg-gray-100 border border-gray-300 rounded-xl hover:bg-gray-200 focus:outline-none transition-colors text-gray-600 flex-shrink-0" title="Salin Biner">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-check hidden text-green-600"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                </div>
            </div>

            <!-- Oktal (Basis 8) -->
            <div>
                <label class="block text-gray-600 text-sm font-semibold mb-1" for="oct">
                    Oktal <span class="text-gray-400 font-normal">(Basis 8)</span>
                </label>
                <div class="flex gap-2">
                    <input type="text" id="oct" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent bg-gray-50 text-gray-800 font-mono text-lg transition-all" 
                        placeholder="Contoh: 377" autocomplete="off">
                    <button onclick="copyText('oct', this)" class="p-3 bg-gray-100 border border-gray-300 rounded-xl hover:bg-gray-200 focus:outline-none transition-colors text-gray-600 flex-shrink-0" title="Salin Oktal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-check hidden text-green-600"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                </div>
            </div>

            <!-- Heksadesimal (Basis 16) -->
            <div>
                <label class="block text-gray-600 text-sm font-semibold mb-1" for="hex">
                    Heksadesimal <span class="text-gray-400 font-normal">(Basis 16)</span>
                </label>
                <div class="flex gap-2">
                    <input type="text" id="hex" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent bg-gray-50 text-gray-800 font-mono text-lg uppercase transition-all" 
                        placeholder="Contoh: FF" autocomplete="off">
                    <button onclick="copyText('hex', this)" class="p-3 bg-gray-100 border border-gray-300 rounded-xl hover:bg-gray-200 focus:outline-none transition-colors text-gray-600 flex-shrink-0" title="Salin Heksadesimal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-check hidden text-green-600"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Pesan Error -->
        <div id="error-msg" class="text-red-500 text-sm mt-3 text-center hidden font-medium bg-red-50 py-2 rounded-lg">
            Angka tidak valid untuk basis tersebut!
        </div>

        <!-- Tombol Bersihkan -->
        <button id="clear-btn" class="mt-6 w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl transition-colors duration-200 flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-ccw"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Bersihkan Semua
        </button>
    </div>

    <script>
        // Mengambil elemen input dari DOM
        const decInput = document.getElementById('dec');
        const binInput = document.getElementById('bin');
        const octInput = document.getElementById('oct');
        const hexInput = document.getElementById('hex');
        const errorMsg = document.getElementById('error-msg');
        const clearBtn = document.getElementById('clear-btn');

        // Regex untuk memvalidasi input sesuai basisnya
        const regexMap = {
            10: /^[0-9]+$/,
            2: /^[01]+$/,
            8: /^[0-7]+$/,
            16: /^[0-9A-Fa-f]+$/
        };

        // Fungsi untuk mengosongkan semua input
        function clearAll() {
            decInput.value = '';
            binInput.value = '';
            octInput.value = '';
            hexInput.value = '';
            errorMsg.classList.add('hidden');
        }

        // Fungsi utama untuk melakukan konversi
        function convert(value, fromBase) {
            // Hilangkan spasi jika user mengetik spasi
            value = value.replace(/\s/g, '');

            // Jika input kosong, bersihkan semua form
            if (value === '') {
                clearAll();
                return;
            }

            // Validasi input menggunakan Regex
            if (!regexMap[fromBase].test(value)) {
                errorMsg.classList.remove('hidden');
                return;
            } else {
                errorMsg.classList.add('hidden');
            }

            try {
                // Menggunakan BigInt untuk mencegah kehilangan presisi pada angka yang sangat besar
                let decValue;
                if (fromBase === 10) {
                    decValue = BigInt(value);
                } else if (fromBase === 16) {
                    decValue = BigInt('0x' + value);
                } else if (fromBase === 8) {
                    decValue = BigInt('0o' + value);
                } else if (fromBase === 2) {
                    decValue = BigInt('0b' + value);
                }
                
                // Update input lain yang tidak sedang diketik
                if (fromBase !== 10) decInput.value = decValue.toString(10);
                if (fromBase !== 2) binInput.value = decValue.toString(2);
                if (fromBase !== 8) octInput.value = decValue.toString(8);
                if (fromBase !== 16) hexInput.value = decValue.toString(16).toUpperCase();
                
            } catch (e) {
                // Tangkap error jika angka terlalu besar atau format salah
                errorMsg.classList.remove('hidden');
            }
        }

        // Event listeners untuk mendeteksi setiap ketikan pada input (real-time)
        decInput.addEventListener('input', (e) => convert(e.target.value, 10));
        binInput.addEventListener('input', (e) => convert(e.target.value, 2));
        octInput.addEventListener('input', (e) => convert(e.target.value, 8));
        hexInput.addEventListener('input', (e) => convert(e.target.value, 16));
        
        // Event listener untuk tombol bersihkan
        clearBtn.addEventListener('click', clearAll);

        // Fungsi untuk menyalin teks ke clipboard
        function copyText(inputId, btnElement) {
            const inputElement = document.getElementById(inputId);
            if (!inputElement.value) return; // Jangan salin jika kolom kosong

            // Pilih teks di dalam input
            inputElement.select();
            inputElement.setSelectionRange(0, 99999); // Kompabilitas perangkat mobile

            try {
                // Menggunakan execCommand untuk menyalin teks
                document.execCommand('copy');
                
                // Feedback visual: Ubah icon copy menjadi centang (check)
                const copyIcon = btnElement.querySelector('.lucide-copy');
                const checkIcon = btnElement.querySelector('.lucide-check');
                
                if (copyIcon && checkIcon) {
                    copyIcon.classList.add('hidden');
                    checkIcon.classList.remove('hidden');
                    
                    // Kembalikan ke icon copy setelah 2 detik
                    setTimeout(() => {
                        copyIcon.classList.remove('hidden');
                        checkIcon.classList.add('hidden');
                    }, 2000);
                }
            } catch (err) {
                console.error('Gagal menyalin teks', err);
            }
            
            // Hilangkan seleksi teks agar tidak tetap ter-highlight
            window.getSelection().removeAllRanges();
        }
    </script>
</body>
</html>
